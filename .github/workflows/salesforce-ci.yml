name: Salesforce Multi-Org CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main
      - 'release/*'

jobs:

# -------------------------------
# Deploy to DEV
# -------------------------------
  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli

      - name: Authenticate DEV Org
        run: |
          echo "${{ secrets.SF_DEV_AUTH_URL }}" > auth.txt
          sf org login sfdx-url \
            --sfdx-url-file auth.txt \
            --alias dev-org
          rm -f auth.txt

      - name: Deploy to DEV Org
        run: |
          sf project deploy start \
            --manifest manifest/package.xml \
            --target-org dev-org \
            --wait 10

# -------------------------------
# Deploy to QA
# -------------------------------
  deploy-qa:
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli

      - name: Authenticate QA Org
        run: |
          echo "${{ secrets.SF_QA_AUTH_URL }}" > auth.txt
          sf org login sfdx-url \
            --sfdx-url-file auth.txt \
            --alias qa-org
          rm -f auth.txt

      - name: Deploy to QA Org
        run: |
          sf project deploy start \
            --manifest manifest/package.xml \
            --target-org qa-org \
            --wait 10

# -------------------------------
# Deploy to UAT
# -------------------------------
  deploy-uat:
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    needs: deploy-qa

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli

      - name: Authenticate UAT Org
        run: |
          echo "${{ secrets.SF_UAT_AUTH_URL }}" > auth.txt
          sf org login sfdx-url \
            --sfdx-url-file auth.txt \
            --alias uat-org
          rm -f auth.txt

      - name: Deploy to UAT Org
        run: |
          sf project deploy start \
            --manifest manifest/package.xml \
            --target-org uat-org \
            --wait 10

# -------------------------------
# Deploy to PROD
# -------------------------------
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli

      - name: Authenticate PROD Org
        run: |
          echo "${{ secrets.SF_PROD_AUTH_URL }}" > auth.txt
          sf org login sfdx-url \
            --sfdx-url-file auth.txt \
            --alias prod-org
          rm -f auth.txt

      - name: Deploy to PROD Org
        run: |
          sf project deploy start \
            --manifest manifest/package.xml \
            --target-org prod-org \
            --test-level RunLocalTests \
            --wait 20